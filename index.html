<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Probabilidad y Conteo</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .contenedor {
    background: #fff;
    max-width: 650px;
    width: 100%;
    border-radius: 14px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    margin-top: 20px;
  }
  h1 {
    text-align: center;
    color: #1e3c72;
    font-size: 24px;
    margin-bottom: 5px;
  }
  .subtitulo {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 25px;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: 600;
    color: #333;
    font-size: 15px;
  }
  input[type="text"], select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: 2px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
  }
  .niveles {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
  }
  .nivel-btn {
    flex: 1;
    min-width: 90px;
    padding: 12px 6px;
    border: 2px solid #1e3c72;
    background: #fff;
    color: #1e3c72;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1.3;
  }
  .nivel-btn.activo {
    background: #1e3c72;
    color: #fff;
  }
  .nivel-btn.especial {
    border-color: #b8860b;
    color: #8a6500;
  }
  .nivel-btn.especial.activo {
    background: #b8860b;
    color: #fff;
  }
  .btn-iniciar {
    width: 100%;
    margin-top: 25px;
    padding: 14px;
    background: #2a9d8f;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-iniciar:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  .barra-progreso {
    background: #e0e0e0;
    border-radius: 10px;
    height: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .barra-relleno {
    background: #2a9d8f;
    height: 100%;
    transition: width 0.3s;
  }
  .info-pregunta {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #555;
    margin-bottom: 10px;
  }
  .pregunta-texto {
    font-size: 18px;
    color: #1e3c72;
    font-weight: 600;
    margin-bottom: 18px;
    line-height: 1.4;
  }
  .opcion {
    display: block;
    width: 100%;
    text-align: left;
    padding: 13px 16px;
    margin-bottom: 10px;
    border: 2px solid #ccc;
    border-radius: 10px;
    background: #fafafa;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .opcion:hover:not(:disabled) {
    border-color: #1e3c72;
    background: #eef2fa;
  }
  .opcion.correcta {
    background: #d4edda;
    border-color: #28a745;
    color: #155724;
    font-weight: 600;
  }
  .opcion.incorrecta {
    background: #f8d7da;
    border-color: #dc3545;
    color: #721c24;
    font-weight: 600;
  }
  .opcion:disabled {
    cursor: not-allowed;
  }
  .retroalimentacion {
    margin-top: 15px;
    padding: 14px;
    border-radius: 10px;
    font-size: 14.5px;
    line-height: 1.5;
    display: none;
  }
  .retro-ok {
    background: #d4edda;
    color: #155724;
    border-left: 5px solid #28a745;
  }
  .retro-mal {
    background: #f8d7da;
    color: #721c24;
    border-left: 5px solid #dc3545;
  }
  .btn-siguiente {
    width: 100%;
    margin-top: 18px;
    padding: 13px;
    background: #1e3c72;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: none;
  }
  .pantalla { display: none; }
  .activa { display: block; }
  .resultado-final {
    text-align: center;
  }
  .puntaje-grande {
    font-size: 52px;
    font-weight: 800;
    color: #1e3c72;
    margin: 15px 0;
  }
  .mensaje-final {
    font-size: 16px;
    color: #444;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .btn-reiniciar {
    padding: 12px 30px;
    background: #2a9d8f;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }
  .estado-envio {
    margin-top: 15px;
    font-size: 13px;
    color: #888;
  }
  .logo-profe {
    display: block;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin: 0 auto 14px auto;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .btn-ayuda {
    display: inline-block;
    margin-bottom: 15px;
    padding: 9px 16px;
    background: #fff;
    color: #b8860b;
    border: 2px solid #e0a800;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-ayuda:hover {
    background: #fff8e1;
  }
  .caja-ayuda {
    display: none;
    background: #fff8e1;
    border-left: 5px solid #e0a800;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 18px;
    font-size: 14px;
    color: #5a4a00;
    line-height: 1.5;
  }
  .caja-ayuda .ayuda-tipo {
    font-weight: 700;
    color: #8a6d00;
    margin-bottom: 4px;
  }
  .caja-ayuda .ayuda-formula {
    font-weight: 700;
    font-size: 15px;
    margin: 6px 0;
    color: #1e3c72;
  }
  .modo-especial .pregunta-texto {
    font-size: 21px;
    line-height: 1.5;
  }
  .modo-especial .opcion {
    font-size: 18px;
    padding: 16px 18px;
  }
  .modo-especial .caja-ayuda {
    font-size: 16px;
  }
  .modo-especial .caja-ayuda .ayuda-formula {
    font-size: 17px;
  }
  .modo-especial .retroalimentacion {
    font-size: 16px;
  }
</style>
</head>

let preguntas = [];
let nivelElegido = "";
let indiceActual = 0;
let aciertos = 0;
let nombreEstudiante = "";
let cursoEstudiante = "";
let respondida = false;
let respuestasDetalle = [];

function elegirNivel(nivel) {
  nivelElegido = nivel;
  document.getElementById('btn-bajo').classList.toggle('activo', nivel === 'bajo');
  document.getElementById('btn-intermedio').classList.toggle('activo', nivel === 'intermedio');
  document.getElementById('btn-especial').classList.toggle('activo', nivel === 'especial');
  validarInicio();
}

function validarInicio() {
  const nombre = document.getElementById('nombre').value.trim();
  const curso = document.getElementById('curso').value;
  document.getElementById('btn-iniciar').disabled = !(nombre.length > 2 && curso !== "" && nivelElegido !== "");
}

document.getElementById('nombre').addEventListener('input', validarInicio);
document.getElementById('curso').addEventListener('change', validarInicio);

function barajar(array) {
  const copia = array.slice();
  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  return copia;
}

function iniciarSimulador() {
  nombreEstudiante = document.getElementById('nombre').value.trim();
  cursoEstudiante = document.getElementById('curso').value;
  if (nivelElegido === 'bajo') {
    preguntas = barajar(preguntasBajo);
  } else if (nivelElegido === 'intermedio') {
    preguntas = barajar(preguntasIntermedio);
  } else {
    preguntas = barajar(preguntasEspecial);
  }
  indiceActual = 0;
  aciertos = 0;
  respondida = false;
  respuestasDetalle = [];
  document.getElementById('pantalla-quiz').classList.toggle('modo-especial', nivelElegido === 'especial');
  document.getElementById('pantalla-inicio').classList.remove('activa');
  document.getElementById('pantalla-quiz').classList.add('activa');
  mostrarPregunta();
}

function mostrarPregunta() {
  respondida = false;
  const pregunta = preguntas[indiceActual];
  document.getElementById('texto-progreso').textContent = `Pregunta ${indiceActual + 1} de ${preguntas.length}`;
  document.getElementById('texto-puntaje').textContent = `Aciertos: ${aciertos}`;
  document.getElementById('barra-relleno').style.width = `${(indiceActual / preguntas.length) * 100}%`;
  document.getElementById('pregunta-texto').textContent = pregunta.p;

  const btnAyuda = document.getElementById('btn-ayuda');
  const cajaAyuda = document.getElementById('caja-ayuda');
  cajaAyuda.style.display = 'none';
  if (pregunta.ayuda) {
    cajaAyuda.innerHTML =
      `<div class="ayuda-tipo">Es una ${pregunta.ayuda.tipo}</div>` +
      `<div class="ayuda-formula">${pregunta.ayuda.formula}</div>` +
      `<div>${pregunta.ayuda.razon}</div>`;
    if (nivelElegido === 'especial') {
      btnAyuda.style.display = 'none';
      cajaAyuda.style.display = 'block';
    } else {
      btnAyuda.style.display = 'inline-block';
      btnAyuda.textContent = '💡 Ver ayuda con la fórmula';
    }
  } else {
    btnAyuda.style.display = 'none';
  }

  const contenedor = document.getElementById('opciones-contenedor');
  contenedor.innerHTML = '';
  pregunta.o.forEach((opcion, i) => {
    const boton = document.createElement('button');
    boton.className = 'opcion';
    boton.textContent = opcion;
    boton.onclick = () => seleccionarRespuesta(i);
    contenedor.appendChild(boton);
  });

  const retro = document.getElementById('retroalimentacion');
  retro.style.display = 'none';
  retro.className = 'retroalimentacion';
  document.getElementById('btn-siguiente').style.display = 'none';
}

function toggleAyuda() {
  const cajaAyuda = document.getElementById('caja-ayuda');
  const btnAyuda = document.getElementById('btn-ayuda');
  const visible = cajaAyuda.style.display === 'block';
  cajaAyuda.style.display = visible ? 'none' : 'block';
  btnAyuda.textContent = visible ? '💡 Ver ayuda con la fórmula' : '🔽 Ocultar ayuda';
}

function seleccionarRespuesta(indiceElegido) {
  if (respondida) return;
  respondida = true;
  const pregunta = preguntas[indiceActual];
  const botones = document.querySelectorAll('#opciones-contenedor .opcion');
  botones.forEach(b => b.disabled = true);

  const esCorrecta = indiceElegido === pregunta.r;
  if (esCorrecta) {
    aciertos++;
    botones[indiceElegido].classList.add('correcta');
  } else {
    botones[indiceElegido].classList.add('incorrecta');
    botones[pregunta.r].classList.add('correcta');
  }

  respuestasDetalle.push(`${pregunta.o[indiceElegido]} ${esCorrecta ? '✓' : '✗'}`);

  const retro = document.getElementById('retroalimentacion');
  retro.textContent = esCorrecta ? pregunta.fb_ok : pregunta.fb_mal;
  retro.classList.add(esCorrecta ? 'retro-ok' : 'retro-mal');
  retro.style.display = 'block';

  document.getElementById('texto-puntaje').textContent = `Aciertos: ${aciertos}`;
  document.getElementById('btn-siguiente').style.display = 'block';
}

function siguientePregunta() {
  indiceActual++;
  if (indiceActual < preguntas.length) {
    mostrarPregunta();
  } else {
    mostrarResultadoFinal();
  }
}

function mostrarResultadoFinal() {
  document.getElementById('pantalla-quiz').classList.remove('activa');
  document.getElementById('pantalla-final').classList.add('activa');

  const puntajeSobre5 = (aciertos / preguntas.length) * 5;

  let mensaje = '';
  if (puntajeSobre5 >= 4.5) {
    mensaje = `Excelente trabajo. Respondiste ${aciertos} de ${preguntas.length} preguntas correctamente.`;
  } else if (puntajeSobre5 >= 3.5) {
    mensaje = `Buen trabajo. Respondiste ${aciertos} de ${preguntas.length} preguntas correctamente. Sigue practicando.`;
  } else if (puntajeSobre5 >= 3.0) {
    mensaje = `Aprobaste. Respondiste ${aciertos} de ${preguntas.length} preguntas correctamente. Te conviene repasar un poco más.`;
  } else {
    mensaje = `Respondiste ${aciertos} de ${preguntas.length} preguntas correctamente. Es importante repasar los temas y volver a intentarlo.`;
  }
  document.getElementById('mensaje-final').textContent = mensaje;

  enviarResultado(puntajeFormateado);
}

function enviarResultado(puntaje) {
  const fecha = new Date();
  const fechaTexto = fecha.toLocaleDateString('es-CO');

  const incorrectas = preguntas.length - aciertos;
  const porcentaje = Math.round((aciertos / preguntas.length) * 100);

  const paramsObj = {
    asignatura: 'Simulador Probabilidad y Conteo',
    nombre: nombreEstudiante,
    curso: cursoEstudiante,
    nivel: nivelElegido === 'bajo' ? 'Bajo' : (nivelElegido === 'intermedio' ? 'Intermedio' : 'Especial (NEE)'),
    correctas: aciertos,
    incorrectas: incorrectas,
    porcentaje: porcentaje,
    nota: puntaje,
    fecha: fechaTexto
  };

  respuestasDetalle.forEach((detalle, i) => {
    paramsObj['p' + (i + 1)] = detalle;
  });

  const params = new URLSearchParams(paramsObj);
  const url = `${SCRIPT_URL}?${params.toString()}`;
  try {
    window.open(url, '_blank');
    document.getElementById('estado-envio').textContent = 'Resultado enviado.';
  } catch (e) {
    document.getElementById('estado-envio').textContent = 'No se pudo enviar el resultado automáticamente.';
  }
}
</script>
